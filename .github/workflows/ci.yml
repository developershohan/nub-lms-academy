name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Placeholder only - prisma generate/validate and the Next.js build never open a real
      # connection (every route in this app renders dynamically, nothing queries the DB at build
      # time). Do not put a real DATABASE_URL in this workflow.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      AUTH_SECRET: "ci-only-placeholder-not-a-real-secret"
      NEXTAUTH_SECRET: "ci-only-placeholder-not-a-real-secret"
      NEXTAUTH_URL: "http://localhost:3000"
      AUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_SOCKET_URL: "http://localhost:3001"
      SOCKET_SERVER_URL: "http://localhost:3001"
      SOCKET_INTERNAL_SECRET: "ci-only-placeholder-not-a-real-secret"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate
      - run: npx prisma validate

      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:run
      - run: npm run build
